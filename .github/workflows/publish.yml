name: Publish to Maven Central

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build and sign
        run: mvn -B clean verify -DskipTests
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload to Central Portal
        env:
          CENTRAL_USER: ${{ secrets.OSSRH_USERNAME }}
          CENTRAL_PASS: ${{ secrets.OSSRH_TOKEN }}
        run: |
          cd target
          VERSION=${GITHUB_REF_NAME#v}
          ARTIFACT=libreria-$VERSION
          curl -s -u "$CENTRAL_USER:$CENTRAL_PASS" \
            -F "pom=@$ARTIFACT.pom" \
            -F "jar=@$ARTIFACT.jar" \
            -F "sources=@$ARTIFACT-sources.jar" \
            -F "javadoc=@$ARTIFACT-javadoc.jar" \
            -F "jar.asc=@$ARTIFACT.jar.asc" \
            -F "pom.asc=@$ARTIFACT.pom.asc" \
            -F "sources.asc=@$ARTIFACT-sources.jar.asc" \
            -F "javadoc.asc=@$ARTIFACT-javadoc.jar.asc" \
            https://central.sonatype.com/api/v1/publisher/upload

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: target/*.jar
